name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          components: clippy, rustfmt

      - name: Add wasm target
        run: rustup target add wasm32v1-none

      - name: Build WASM artifacts
        run: cargo build --release --target wasm32v1-none

      - name: Check WASM sizes
        run: |
          LIMIT=131072 # 128 KB
          for wasm in target/wasm32v1-none/release/{amm,token,factory,governance,twap_consumer}.wasm; do
            if [ -f "$wasm" ]; then
              size=$(stat -c%s "$wasm" 2>/dev/null || stat -f%z "$wasm")
              size_kb=$(echo "scale=2; $size / 1024" | bc 2>/dev/null || expr $size / 1024)
              echo "$wasm: ${size_kb} KB"
              if [ $size -gt $LIMIT ]; then
                echo "Error: $wasm exceeds $LIMIT bytes limit"
                exit 1
              fi
            else
              echo "Error: $wasm not found"
              exit 1
            fi
          done

      - name: Run all tests
        run: cargo test --workspace

      - name: Clippy
        run: cargo clippy --all -- -D warnings

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Check docs
        run: RUSTDOCFLAGS="-D warnings" cargo doc --no-deps --workspace

