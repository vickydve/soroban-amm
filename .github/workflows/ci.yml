name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          components: clippy, rustfmt

      - name: Add wasm target
        run: rustup target add wasm32v1-none

      - name: Build WASM artifacts
        run: cargo build --release --target wasm32v1-none --workspace --exclude amm-fuzz --exclude integration-tests --exclude cl_position_nft --exclude router --exclude dex-aggregator --exclude batch_router --exclude batch_auction

      - name: Check WASM binary sizes
        run: |
          for f in target/wasm32v1-none/release/*.wasm; do
            size=$(wc -c < "$f")
            echo "$f: ${size} bytes"
            # 200 KB limit (204800 bytes). This budget is set conservatively above the current
            # largest contract size (~74 KB) to monitor and control binary bloat, which
            # directly impacts Soroban deployment costs (upload fees scale with WASM size).
            if [ "$size" -gt 204800 ]; then
              echo "FAIL: $f exceeds 200 KB limit"
              exit 1
            fi
          done

      - name: Run all tests
        run: cargo test -p factory

      - name: Run hot-path benchmarks
        run: cargo run -p benches -- --check

      - name: Clippy
        run: cargo clippy -p factory --no-deps -- -D warnings

      - name: Format check
        run: cargo fmt -p factory -- --check

      - name: Check docs
        run: RUSTDOCFLAGS="-D warnings" cargo doc --no-deps -p factory

      - name: Security audit
        uses: rustsec/audit-check@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
        # Advisories can be ignored via audit.toml at the repo root.
        # Example:
        #   [[ignore]]
        #   id = "RUSTSEC-0000-0000"
        #   reason = "Not exploitable in this context because ..."
