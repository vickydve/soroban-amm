[package]
name = "soroban-amm-simulator"
version = "0.1.0"
edition = "2021"
description = "Off-chain simulation engine and CLI for Soroban AMM strategies"
license = "MIT"
repository = "https://github.com/promisszn/soroban-amm"
keywords = ["soroban", "stellar", "amm", "simulation", "backtesting"]
categories = ["finance"]
readme = "README.md"

[lib]
name = "soroban_amm_simulator"

[[bin]]
name = "amm-sim"
path = "src/bin/amm-sim.rs"

[dependencies]
clap = { version = "4.5.20", features = ["derive"] }
csv = "1.3"
rand = { version = "0.8", features = ["small_rng"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "1"
